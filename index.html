<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <title>Aeroporto Smart POO</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <h1>Controle de Aeroporto Inteligente</h1>

    <div class="painel">
        <!-- SEÇÃO JATO -->
        <div class="card jato">
            <h2>Jato Executivo (VIP-777)</h2>
            <p>Status: <span id="status-jato">No Pátio</span></p>
            <p>Altitude: <span id="alt-jato">0</span> ft</p>
            <p>Supersônico: <span id="modo-jato">NORMAL</span></p>
            <div class="botoes">
                <button onclick="jatoDecolar()">Decolar</button>
                <button onclick="jatoAtivarSuper()" class="btn-super">Ativar Supersônico</button>
                <button onclick="jatoDesativarSuper()">Desativar</button>
                <button onclick="jatoPousar()">Pousar</button>
                <button onclick="enviarRadio('jato')" class="btn-radio">🎙️ Rádio</button>
            </div>
        </div>

        <!-- SEÇÃO CARGA -->
        <div class="card carga">
            <h2>Voo de Carga (CARGO-100)</h2>
            <p>Status: <span id="status-carga">No Pátio</span></p>
            <p>Altitude: <span id="alt-carga">0</span> ft</p>
            <p>Carga: <span id="carga-atual">0</span> / 150 Ton</p>
            <div class="progresso-container">
                <div id="barra-progresso" class="barra"></div>
            </div>
            <div class="botoes">
                <input type="number" id="input-ton" placeholder="Ton.">
                <button onclick="cargaEmbarcar()">Embarcar</button>
                <button onclick="cargaDecolar()">Decolar</button>
                <button onclick="cargaPousar()">Pousar</button>
                <button onclick="enviarRadio('carga')" class="btn-radio">🎙️ Rádio</button>
            </div>
        </div>
    </div>

    <div class="radio-display">
        <strong>Terminal de Rádio:</strong>
        <p id="msg-torre">Aguardando sinal...</p>
    </div>

    <script src="script.js"></script>
</body>
</html>
